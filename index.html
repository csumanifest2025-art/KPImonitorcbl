<style>
  :root{
    --bar-h: 52px;
    --brand: #1E3D2E;
    --brand-light: #2b5643;
    --gold: #C7A24A;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:#0e1f17;
    overflow:hidden;
  }
  #app-shell{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
  }
  #tabbar{
    height:var(--bar-h);
    flex:0 0 auto;
    display:flex;
    align-items:stretch;
    background:var(--brand);
    box-shadow:0 2px 8px rgba(0,0,0,.25);
    z-index:1000;
    position:relative;
  }
  #tabbar .tabbar-brand{
    display:flex;
    align-items:center;
    padding:0 16px;
    color:#f2ead9;
    font-weight:700;
    font-size:14px;
    letter-spacing:.2px;
    white-space:nowrap;
    border-right:1px solid rgba(255,255,255,.12);
  }
  #tabbar .tabbar-brand img{
    width:24px;height:24px;border-radius:6px;
    margin-right:10px;
    flex:0 0 auto;
    display:block;
  }
  .tab-btn{
    appearance:none;
    border:none;
    background:transparent;
    color:rgba(255,255,255,.72);
    font-size:14px;
    font-weight:600;
    padding:0 22px;
    height:100%;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    border-bottom:3px solid transparent;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
    white-space:nowrap;
  }
  .tab-btn:hover{
    background:rgba(255,255,255,.06);
    color:#fff;
  }
  .tab-btn.active{
    color:#fff;
    background:rgba(255,255,255,.08);
    border-bottom-color:var(--gold);
  }
  .tab-btn .tab-icon{
    font-size:15px;
    line-height:1;
  }
  #tabbar-spacer{flex:1 1 auto;}
  #tabbar .poweredby{
    display:flex;
    align-items:center;
    padding:0 16px;
    color:rgba(255,255,255,.4);
    font-size:11px;
    white-space:nowrap;
  }
  #frames{
    flex:1 1 auto;
    position:relative;
    min-height:0;
  }
  .app-frame-wrap{
    position:absolute;
    inset:0;
    display:none;
  }
  .app-frame-wrap.active{
    display:block;
  }
  .app-frame-wrap iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
    background:#fff;
  }
  .frame-loading{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0e1f17;
    color:rgba(255,255,255,.55);
    font-size:13px;
    letter-spacing:.3px;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .frame-loading.hidden{
    opacity:0;
  }

  @media (max-width: 640px){
    #tabbar .tabbar-brand{ padding:0 10px; font-size:12px; }
    #tabbar .poweredby{ display:none; }
    .tab-btn{ padding:0 14px; font-size:13px; }
  }
</style>
</head>

function b64ToUtf8(b64){
  var binary = atob(b64);
  var len = binary.length;
  var bytes = new Uint8Array(len);
  for (var i = 0; i < len; i++){ bytes[i] = binary.charCodeAt(i); }
  return new TextDecoder('utf-8').decode(bytes);
}

function loadIntoFrame(b64, frameId, loadingId){
  var html = b64ToUtf8(b64);
  var blob = new Blob([html], {type: 'text/html'});
  var url = URL.createObjectURL(blob);
  var frame = document.getElementById(frameId);
  frame.addEventListener('load', function onLoad(){
    var loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.classList.add('hidden');
    frame.removeEventListener('load', onLoad);
  });
  frame.src = url;
}

function switchTab(name){
  var tabs = ['reports','inquiries'];
  tabs.forEach(function(t){
    document.getElementById('wrap-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
  });
}

// Load both apps up front into isolated iframes so switching tabs preserves
// state (e.g. staying logged in to Reports while you use Inquiries).
loadIntoFrame(KPI_APP_B64, 'frame-reports', 'loading-reports');
loadIntoFrame(INQUIRY_APP_B64, 'frame-inquiries', 'loading-inquiries');
</script>
